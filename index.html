<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My Todo List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="status-bar">
            <span class="time" id="currentTime">8:42</span>
        </div>

        <h1 class="app-title">My Todo List</h1>

        <div class="todo-container">
            <ul class="todo-list">
                <li class="todo-item">
                    <span class="todo-text">Buy milk</span>
                </li>
                <li class="todo-item">
                    <span class="todo-text">Buy bread</span>
                </li>
                <li class="todo-item">
                    <span class="todo-text">Buy eggs</span>
                </li>
            </ul>
        </div>

        <div class="button-container">
            <button class="add-button" id="addButton">
                + Add New Todo
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
